local:
  enabled: True
  shot_capacity: 2
  alpha: 1.5  # weight to combine clip classifier and memory classifier
  beta: 35.0  # sample similarity multiplier, larger -> 1-NN
  gamma: 10.0  # entropy weighting for making prediction

## --- Global Cache Configuration ---
global:
  enabled: True
  shot_capacity: 20
  prototype: exp_weighted  # how to construct class prototype: mean, exp_weighted, min_ent
  gamma: 10.0  # entropy weighting for constructing prototypes